<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankBugs|FX</title>
    <link rel="stylesheet" href="css/home.css">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="fade-in">

    <!-- Fixed Combined Top Navbar Layout Layer -->
    <nav class="navbar">
        <!-- Top Row containing your action buttons -->
        <div class="navbar-top-row">
            <button id="menu-toggle-btn" class="btn-menu">
                <i class="fa-solid fa-bars"></i> Dashboard
            </button>

            <div class="nav-right-actions">
                <a href="#tools" class="btn btn-visitor">Continue as Visitor</a>
                <a href="https://pipaffiliates.com" target="_blank" class="btn btn-login">
                    <i class="fa-solid fa-key"></i> Trader Login
                </a>
            </div>
        </div>

        <!-- Embedded Live Financial Market Ticker Tape Section -->
        <section class="ticker-section">
            <!-- Modern TradingView Web Component Code Block -->
            <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js" async></script>
            <tv-ticker-tape 
                symbols="FX:EURUSD,FX:GBPUSD,FX:USDJPY,FX:AUDUSD,FX:XAUUSD,BITSTAMP:BTCUSD,BINANCE:ETHUSD" 
                theme="dark" 
                show-symbol-logo="true" 
                display-mode="adaptive">
            </tv-ticker-tape>
        </section>
    </nav>

    <!-- Sliding Sidebar Menu Panel -->
    <div id="sidebar-dashboard" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><i class="fa-solid fa-chart-line text-gold"></i> BankBugs|<span class="gold-text">FX</span></div>
            <button id="close-sidebar-btn" class="btn-close-sidebar"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul class="sidebar-links">
            <li><a href="#about" class="sidebar-item"><i class="fa-solid fa-circle-info"></i> About Matrix</a></li>
            <li><a href="#broker" class="sidebar-item"><i class="fa-solid fa-building-columns"></i> Our Broker</a></li>
            <li><a href="#signals" class="sidebar-item"><i class="fa-solid fa-tower-broadcast"></i> VIP Signals</a></li>
            <li><a href="#tools" class="sidebar-item"><i class="fa-solid fa-screwdriver-wrench"></i> Trading Tools</a></li>
        </ul>
    </div>

    <!-- Dimmer Overlay Element layer -->
    <div id="sidebar-overlay" class="overlay"></div>

    <!-- Rest of your page contents (Hero, Features, Broker section, etc.) continue directly below here -->

    <script src="js/home.js"></script>
</body>
</html>
