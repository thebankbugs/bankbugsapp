<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BankBugs - Starter Dashboard</title>
  <link rel="stylesheet" href="main.css">
</head>

<body>

  <div class="container">

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="logo">BANK<span>BUGS</span></div>
      <a class="back" href="welcome.html">← Back</a>
    </header>

    <!-- Title -->
    <section class="welcome">
      <h1>Starter Dashboard</h1>
      <p>Your basic trading overview & tools</p>
    </section>

    <!-- Stats -->
    <section class="cards">

      <div class="card">
        <h3>Account Balance</h3>
        <p>$0.00 (demo)</p>
      </div>

      <div class="card">
        <h3>Market Status</h3>
        <p>Live • Forex Open</p>
      </div>

      <div class="card">
        <h3>Signals</h3>
        <p>No active signals yet</p>
      </div>

    </section>

    <!-- Actions -->
    <section class="cards">

      <div class="card">
        <h3>Start Learning</h3>
        <p>Begin your trading journey</p>
        <button>Open Course</button>
      </div>

      <div class="card">
        <h3>Demo Trade</h3>
        <p>Practice without risk</p>
        <button>Launch</button>
      </div>

    </section>

    <!-- Footer -->
    <footer>
      <p>Starter Mode • BankBugs Ecosystem</p>
    </footer>

  </div>

</body>
</html>
