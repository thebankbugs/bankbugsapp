<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BankBugs - Welcome</title>
  <link rel="stylesheet" href="../main.css">
</head>

<body>

  <div class="container">

    <!-- Top Section -->
    <header class="top-bar">
      <div class="logo">BANK<span>BUGS</span></div>
      <div class="status">● Live</div>
    </header>

    <!-- Welcome Section -->
    <section class="welcome">
      <h1>Welcome Back</h1>
      <p>Ready to explore your trading ecosystem.</p>
    </section>

    <!-- Action Cards -->
    <section class="cards">

      <div class="card">
        <h3>Starter Dashboard</h3>
        <p>View your basic trading overview.</p>
        <button>Open</button>
      </div>

      <div class="card">
        <h3>Elite Access</h3>
        <p>Advanced tools & analytics.</p>
        <button class="elite">Unlock</button>
      </div>

      <div class="card">
        <h3>Market Insights</h3>
        <p>Real-time signals & trends.</p>
        <button>View</button>
      </div>

    </section>

    <!-- Footer -->
    <footer>
      <p>PNG’s Premier Digital Trading Ecosystem</p>
    </footer>

  </div>

</body>
</html>
